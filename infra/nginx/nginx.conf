worker_processes auto;
events { worker_connections 2048; }
http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  client_max_body_size 30M;

  log_format json escape=json
    '{"time":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
    '"path":"$request_uri","status":$status,"bytes":$bytes_sent,'
    '"rt":$request_time,"ua":"$http_user_agent","rid":"$http_x_request_id"}';
  access_log /var/log/nginx/access.log json;

  upstream api { server api:8000; }
  upstream web { server web:3000; }

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # API
    location /api/ { proxy_pass http://api; include /etc/nginx/conf.d/_proxy.conf; }
    location /docs { proxy_pass http://api; include /etc/nginx/conf.d/_proxy.conf; }
    location /openapi.json { proxy_pass http://api; include /etc/nginx/conf.d/_proxy.conf; }
    location /healthz { proxy_pass http://api; }
    location /readyz  { proxy_pass http://api; }
    location /metrics { allow 10.0.0.0/8; deny all; proxy_pass http://api; }

    # Web
    location / { proxy_pass http://web; include /etc/nginx/conf.d/_proxy.conf; }
  }
}
