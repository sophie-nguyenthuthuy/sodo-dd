name: backend-ci

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/backend-ci.yml']
  pull_request:
    paths: ['backend/**', '.github/workflows/backend-ci.yml']

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: System deps (tesseract, poppler)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-vie poppler-utils

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint + format
        run: |
          ruff check app tests
          ruff format --check app tests

      - name: Mypy
        run: mypy app || true   # informational until codebase stabilizes

      - name: Pytest
        env:
          APP_ENV: local
          SECRET_KEY: "ci-secret-key-not-for-production-x"
          DATABASE_URL: "sqlite+pysqlite:///./test.db"
          REDIS_URL: "redis://localhost:6379/0"
          CELERY_BROKER_URL: "redis://localhost:6379/1"
          CELERY_RESULT_BACKEND: "redis://localhost:6379/2"
          S3_ENDPOINT_URL: "http://localhost:9000"
          S3_ACCESS_KEY: "x"
          S3_SECRET_KEY: "x"
          S3_BUCKET: "test"
          FIELD_ENCRYPTION_KEY: "base64:MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA="
        run: pytest -q --cov=app --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (prod target)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
