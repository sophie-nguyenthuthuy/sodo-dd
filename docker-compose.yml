name: sodo-dd

x-api-env: &api-env
  env_file: .env
  environment:
    PYTHONUNBUFFERED: "1"
    PYTHONDONTWRITEBYTECODE: "1"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sodo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sodo}
      POSTGRES_DB: ${POSTGRES_DB:-sodo_dd}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio_admin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio_admin_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minio_admin} ${S3_SECRET_KEY:-minio_admin_secret} &&
      mc mb -p local/${S3_BUCKET:-sodo-dd} || true &&
      mc anonymous set download local/${S3_BUCKET:-sodo-dd}/public || true
      "

  api:
    build:
      context: ./backend
      target: dev
    <<: *api-env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }

  worker:
    build:
      context: ./backend
      target: dev
    <<: *api-env
    command: celery -A app.workers.celery_app worker --loglevel=INFO --concurrency=2
    volumes:
      - ./backend:/app
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }

  beat:
    build:
      context: ./backend
      target: dev
    <<: *api-env
    command: celery -A app.workers.celery_app beat --loglevel=INFO
    volumes:
      - ./backend:/app
    depends_on:
      redis: { condition: service_healthy }

  web:
    build:
      context: ./frontend
      target: dev
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pg_data:
  minio_data:
